# Pre-commit uses the exact versions resolved in uv.lock instead of creating
# a second, independently resolved tool environment.
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff lint
        entry: uv run --locked ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: Ruff format
        entry: uv run --locked ruff format
        language: system
        types: [python]

      - id: mypy
        name: mypy strict
        entry: uv run --locked mypy --strict src tests
        language: system
        pass_filenames: false
        types: [python]

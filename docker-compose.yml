# Full local stack: API + PostgreSQL/pgvector + Ollama.
# `docker compose up` gives you a working RAG system with NO API keys.
#
# Startup order (via depends_on):
#   db + ollama start → ollama-init pulls the models (one-shot) → api starts
#   → api runs Alembic migrations → ready.

services:
  db:
    image: pgvector/pgvector:0.8.1-pg16@sha256:33198da2828a14c30348d2ccb4750833d5ed9a44c88d840a0e523d7417120337
    restart: unless-stopped  # a crashed db self-heals; data is on the volume
    # Local-dev-only credentials — never reuse these outside your machine.
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: knowledge
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d knowledge"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:0.13.1@sha256:8850b8b33936b9fb246e7b3e02849941f1151ea847e5fb15511f17de9589aea1
    restart: unless-stopped  # a crashed model server self-heals
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  # One-shot bootstrap: pull the embedding and chat models, then exit.
  # The api service waits for this to complete successfully.
  ollama-init:
    image: ollama/ollama:0.13.1@sha256:8850b8b33936b9fb246e7b3e02849941f1151ea847e5fb15511f17de9589aea1
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "ollama pull nomic-embed-text && ollama pull llama3.1"
    restart: "no"

  api:
    build: .
    restart: unless-stopped  # pair with the `exec` in the Dockerfile CMD
    depends_on:
      db:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    environment:
      KA_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/knowledge
      KA_EMBEDDING_PROVIDER: ollama
      KA_EMBEDDING_BASE_URL: http://ollama:11434
      KA_LLM_PROVIDER: ollama
      KA_LLM_BASE_URL: http://ollama:11434/v1
      KA_LLM_API_KEY: ollama
      KA_OTEL_ENABLED: ${KA_OTEL_ENABLED:-false}
      KA_OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "8000:8000"
    healthcheck:
      # LIVENESS (/livez), not readiness: with `restart: unless-stopped`,
      # probing /health here would turn a transient DB hiccup into a
      # pointless api restart loop. The slim runtime image ships no
      # curl/wget; Python stdlib it is.
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/livez', timeout=3)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Optional local observability stack:
  # KA_OTEL_ENABLED=true docker compose --profile observability up --build
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.136.0@sha256:45392d534c1edcc809c2d112394029246bc679d2ae5ea7081414a1fc74f2c621
    profiles: ["observability"]
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./observability/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - jaeger
    ports:
      - "4318:4318"

  jaeger:
    image: jaegertracing/jaeger:2.11.0@sha256:b585df1b6299bbbd16bf7c679da30389349736e4b6bc8f4f500142a75bf26ca8
    profiles: ["observability"]
    ports:
      - "16686:16686"
      - "4317:4317"

volumes:
  db_data:
  ollama_data:

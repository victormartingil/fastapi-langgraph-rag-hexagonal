# Alembic configuration. The database URL is NOT hardcoded here: env.py reads
# it from the KA_DATABASE_URL environment variable (12-factor), falling back
# to the local-development default below.
[alembic]
script_location = src/knowledge_assistant/shared/infrastructure/migrations
prepend_sys_path = src
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/knowledge

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
